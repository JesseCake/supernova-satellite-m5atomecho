; Supernova satellite — M5 Atom Echo
;
; Board: M5 Atom Echo (ESP32-PICO-D4, 4MB flash, no PSRAM)
; Pinout (fixed by hardware, no wiring needed):
;   Button        GPIO39  (active LOW, external pull-up on board)
;   RGB LED       GPIO27  (single SK6812)
;   Speaker I2S   BCLK=19  LRCK=33  DOUT=22   (NS4168 amp)
;   PDM Mic       CLK=33   DATA=23            (SPM1423)
;   NOTE: GPIO33 is shared between speaker LRCK and mic CLK — the two
;   cannot run simultaneously. The firmware reinstalls the I2S driver
;   when switching between listen and speak, matching the half-duplex
;   Supernova session state machine.

[env:m5stack-atom]
platform = espressif32@6.5.0        ; Arduino core 2.0.x (legacy i2s driver)
board = m5stack-atom
framework = arduino
monitor_speed = 115200
upload_speed = 1500000

lib_deps =
    fastled/FastLED@^3.6.0
    ciniml/WireGuard-ESP32 @ ^0.1.5
    marian-craciunescu/ESP32Ping @ ^1.7

build_flags =
    -DCORE_DEBUG_LEVEL=1